services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started

  api:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: preventa
      POSTGRES_USER: preventa
      POSTGRES_PASSWORD: preventa
    ports:
      - "5432:5432"
    volumes:
      - preventa-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preventa -d preventa"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - preventa-ollama:/root/.ollama

volumes:
  preventa-postgres:
  preventa-ollama:
